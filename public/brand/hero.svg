<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Arrière-plan EduWeb Planner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#052b19"/>
      <stop offset="0.55" stop-color="#0a3d27"/>
      <stop offset="1" stop-color="#04220f"/>
    </linearGradient>
    <radialGradient id="gold" cx="0.82" cy="0.18" r="0.5">
      <stop offset="0" stop-color="#e0a82e" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#e0a82e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="greenGlow" cx="0.12" cy="0.9" r="0.55">
      <stop offset="0" stop-color="#1d7a4f" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#1d7a4f" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <!-- Fond -->
  <rect width="1440" height="900" fill="url(#bg)"/>
  <rect width="1440" height="900" fill="url(#dots)"/>
  <rect width="1440" height="900" fill="url(#greenGlow)"/>
  <rect width="1440" height="900" fill="url(#gold)"/>

  <!-- Réseau de lignes (connexions) -->
  <g stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.4" fill="none">
    <path d="M-50 760 C 300 700 520 820 820 700 S 1300 640 1500 720"/>
    <path d="M-50 640 C 360 560 600 700 940 560 S 1320 520 1500 600"/>
    <path d="M120 -40 C 200 220 60 380 260 560"/>
    <path d="M1280 -40 C 1180 240 1340 380 1160 600"/>
  </g>

  <!-- Toque de diplômé (filigrane) -->
  <g transform="translate(1040 250) rotate(-8)" fill="#ffffff" fill-opacity="0.07">
    <path d="M0 -70 L150 -20 L0 30 L-150 -20 Z"/>
    <path d="M-90 5 L-90 70 C-90 100 90 100 90 70 L90 5 L0 35 Z" fill-opacity="0.05"/>
    <path d="M150 -20 L150 60" stroke="#e0a82e" stroke-opacity="0.25" stroke-width="4"/>
    <circle cx="150" cy="66" r="9" fill="#e0a82e" fill-opacity="0.30"/>
  </g>

  <!-- Histogramme « pilotage » (filigrane) -->
  <g transform="translate(1120 560)" fill="#e0a82e" fill-opacity="0.16">
    <rect x="0" y="120" width="44" height="120" rx="6"/>
    <rect x="64" y="70" width="44" height="170" rx="6"/>
    <rect x="128" y="30" width="44" height="210" rx="6"/>
    <rect x="192" y="-30" width="44" height="270" rx="6"/>
  </g>
  <path d="M1120 200 L1184 150 L1248 110 L1320 60" stroke="#ffffff" stroke-opacity="0.18" stroke-width="3" fill="none" transform="translate(0 300)"/>

  <!-- Livre ouvert (filigrane) -->
  <g transform="translate(170 640)" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="3">
    <path d="M0 0 C 60 -28 150 -28 200 6 C 250 -28 340 -28 400 0 L400 150 C 340 122 250 122 200 156 C 150 122 60 122 0 150 Z"/>
    <path d="M200 6 L200 156"/>
    <path d="M40 36 C 90 18 150 18 180 36" stroke-opacity="0.07"/>
    <path d="M220 36 C 250 18 310 18 360 36" stroke-opacity="0.07"/>
    <path d="M40 76 C 90 58 150 58 180 76" stroke-opacity="0.07"/>
    <path d="M220 76 C 250 58 310 58 360 76" stroke-opacity="0.07"/>
  </g>

  <!-- Pastilles flottantes -->
  <circle cx="300" cy="180" r="6" fill="#e0a82e" fill-opacity="0.5"/>
  <circle cx="560" cy="120" r="4" fill="#ffffff" fill-opacity="0.25"/>
  <circle cx="900" cy="780" r="5" fill="#e0a82e" fill-opacity="0.4"/>
  <circle cx="640" cy="700" r="4" fill="#ffffff" fill-opacity="0.2"/>
</svg>
