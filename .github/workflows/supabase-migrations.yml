name: DB migrations

# Applique automatiquement les NOUVELLES migrations sur la base de PRODUCTION à
# chaque push sur `main` touchant supabase/migrations/.
#
# Méthode robuste (sans CLI) : chaque fichier supabase/migrations/*.sql est
# appliqué via psql s'il n'est pas déjà dans la table de suivi
# public._applied_migrations. La « baseline » (toutes les migrations déjà
# appliquées à la main, 001→033) est posée UNE FOIS via le SQL d'initialisation
# fourni → la CI n'applique donc QUE les fichiers AJOUTÉS ENSUITE.
#
# ⚠️ Pré-requis (voir le pas-à-pas) :
#   - Secret  SUPABASE_DB_URL  = chaîne de connexion « Session pooler » (IPv4),
#     Supabase → Project Settings → Database → Connection string → URI.
#   - Variable ENABLE_SUPABASE_MIGRATIONS = true (sinon le job ne tourne pas).
#   - Avoir exécuté une fois le SQL d'initialisation (baseline) dans le SQL Editor.

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
  workflow_dispatch: {}

jobs:
  migrate:
    if: ${{ vars.ENABLE_SUPABASE_MIGRATIONS == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer le client PostgreSQL
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Appliquer les migrations en attente
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail
          # Filet de sécurité : crée la table de suivi si absente (la baseline
          # devrait déjà l'avoir créée + remplie).
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c \
            "create table if not exists public._applied_migrations (filename text primary key, applied_at timestamptz not null default now());"

          for f in $(ls supabase/migrations/*.sql | sort); do
            name="$(basename "$f")"
            already="$(psql "$DATABASE_URL" -tAc "select 1 from public._applied_migrations where filename = '$name'")"
            if [ "$already" = "1" ]; then
              echo "✓ déjà appliqué : $name"
            else
              echo "→ application : $name"
              psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
              psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c \
                "insert into public._applied_migrations (filename) values ('$name') on conflict (filename) do nothing;"
              echo "✓ appliqué + enregistré : $name"
            fi
          done
          echo "Migrations à jour."
