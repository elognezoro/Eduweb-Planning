name: Supabase migrations

# Applique automatiquement les migrations sur la base de PRODUCTION à chaque
# push sur `main` qui touche supabase/migrations/.
#
# ⚠️ Pré-requis (une seule fois) — sinon le job échoue / re-joue d'anciennes migrations :
#   1) Secrets du dépôt (GitHub → Settings → Secrets and variables → Actions → New secret) :
#        - SUPABASE_ACCESS_TOKEN  (Supabase → Account → Access Tokens → Generate)
#        - SUPABASE_DB_PASSWORD   (mot de passe Postgres ; Supabase → Project Settings → Database)
#   2) Aligner l'historique des migrations DÉJÀ appliquées manuellement (001→033)
#      pour que `db push` ne les rejoue pas. En local, une fois :
#        supabase login
#        supabase link --project-ref gibzjknamimpevfcqpdg
#        supabase migration repair --status applied 001 002 003 004 005 006 007 008 009 \
#          015 016 019 020 021 022 023 024 025 026 027 028 029 030 031 032 033
#      (ajoute tout numéro de migration déjà appliqué qui manquerait).
#
# Les migrations du projet sont idempotentes (drop policy if exists / if not exists),
# mais le repair évite de rejouer les premières (001…) qui ne le sont pas toutes.

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
  workflow_dispatch: {} # permet aussi un déclenchement manuel

jobs:
  migrate:
    runs-on: ubuntu-latest
    # Ne s'exécute que si le token est configuré (sinon, ne casse pas le dépôt).
    if: ${{ vars.ENABLE_SUPABASE_MIGRATIONS == 'true' }}
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_REF: gibzjknamimpevfcqpdg
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Link au projet
        run: supabase link --project-ref "$PROJECT_REF"
      - name: Appliquer les migrations en attente
        run: supabase db push
